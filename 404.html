<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>HnamStore</title>
<script type="text/javascript">
  // GitHub Pages SPA redirect - preserves the original URL path so index.html can route it
  var segmentCount = 0;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body>
<p>Redirecting to HnamStore...</p>
</body>
</html>
